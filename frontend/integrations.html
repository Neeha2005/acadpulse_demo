<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AcadPulse | Integrations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <i class="fa-solid fa-graduation-cap logo-icon"></i> Acad<span>Pulse</span>
      </div>
    </div>
    
    <nav class="sidebar-nav">
      <div class="nav-section">MAIN</div>
      <a href="index.html" class="nav-item" id="nav-dashboard"><i class="fa-solid fa-shapes"></i> Dashboard</a>
      <a href="timetable.html" class="nav-item" id="nav-timetable"><i class="fa-solid fa-calendar-day"></i> Timetable</a>
      <a href="courses.html" class="nav-item" id="nav-courses"><i class="fa-solid fa-book-open"></i> Courses</a>
      
      <div class="nav-section">INTEGRATIONS</div>
      <a href="integrations.html" class="nav-item has-badge active" id="nav-int-whatsapp"><i class="fa-brands fa-whatsapp"></i> WhatsApp <span class="badge badge-success" id="badge-whatsapp">Active</span></a>
      <a href="integrations.html" class="nav-item has-badge active" id="nav-int-classroom"><i class="fa-brands fa-google"></i> Classroom <span class="badge badge-warning" id="badge-classroom">Syncing</span></a>
      <a href="integrations.html" class="nav-item has-badge active" id="nav-int-gmail"><i class="fa-solid fa-envelope"></i> Gmail <span class="badge badge-success" id="badge-gmail">Active</span></a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="avatar">SI</div>
        <div class="user-info">
          <div class="user-name">Student Account</div>
          <div class="status-indicator"><div class="dot online"></div> Online</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="search-wrap">
        <i class="fa-solid fa-search"></i>
        <input type="text" placeholder="Search assignments, messages...">
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" title="Sync integrations"><i class="fa-solid fa-rotate-right"></i></button>
        <button class="icon-btn active-notif" title="Notifications"><i class="fa-regular fa-bell"></i><div class="pip"></div></button>
        <button class="btn btn-primary" id="btn-open-add-task"><i class="fa-solid fa-plus"></i> Add Manual Task</button>
      </div>
    </header>

    <div class="dashboard-scroll">
      <div id="view-integrations" class="view-section">
        <div class="hero-stats">
          <div class="welcome-text">
            <h1>Platform <span class="accent">Integrations</span></h1>
            <p>Manage your linked platform statuses and data synchronization behavior.</p>
          </div>
        </div>
        
        <div class="content-grid" id="integrations-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px;">
           <!-- Rendered by JS -->
        </div>
      </div>
    </div>
  </main>

  <!-- Add Task Modal -->
  <div class="modal-overlay" id="add-task-modal" style="display:none;">
    <div class="modal-container">
      <div class="modal-header">
        <h2 class="panel-title"><i class="fa-solid fa-plus text-primary"></i> Add Manual Task</h2>
        <button class="icon-btn close-add-modal"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="add-task-form">
        <div class="modal-body" style="display: flex; flex-direction: column; gap: 16px;">
          <div><label style="font-size: 13px; color: var(--text-muted); margin-bottom: 6px; display: block;">Task Title</label><input type="text" id="new-task-title" required style="width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text);" placeholder="e.g. Read Chapter 5"></div>
          <div><label style="font-size: 13px; color: var(--text-muted); margin-bottom: 6px; display: block;">Course / Context</label><input type="text" id="new-task-course" required style="width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text);" placeholder="e.g. CS 401"></div>
          <div><label style="font-size: 13px; color: var(--text-muted); margin-bottom: 6px; display: block;">Deadline</label><input type="datetime-local" id="new-task-deadline" required style="width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: var(--font-body);"></div>
          <div><label style="font-size: 13px; color: var(--text-muted); margin-bottom: 6px; display: block;">Details</label><textarea id="new-task-details" style="width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text); min-height: 80px;" placeholder="Optional instructions..."></textarea></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline close-add-modal" id="btn-cancel-add">Cancel</button>
          <button type="submit" class="btn btn-primary" id="btn-save-task">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/global.js"></script>
  <script src="js/integrations.js"></script>
</body>
</html>
